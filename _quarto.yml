project:
  type: book
  output-dir: _book
  # Numbered chapters + landing page are the main book; per-task deepdives in
  # tasks/ are appendices. reports/, old/ stay standalone.
  render:
    - index.qmd
    - "0[0-9]_*.qmd"
    - "tasks/*.qmd"

book:
  title: "LEVANTE Longitudinal Analyses"
  subtitle: "Exploratory psychometrics of the core-task battery"
  author: "Michael C. Frank & the LEVANTE Data Coordinating Center"
  date: today
  search: true
  repo-url: https://github.com/levante-framework/levante-longitudinal
  sidebar:
    style: docked
  chapters:
    - index.qmd
    - part: "Data & integrity"
      chapters:
        - 00_load_data.qmd
        - 01_data_integrity.qmd
    - part: "Growth & construct structure"
      chapters:
        - 02_growth.qmd
        - 03_structure_invariance.qmd
        - 04_differentiation.qmd
        - 05_battery_design.qmd
    - part: "Within-child variability"
      chapters:
        - 06_within_child_variability.qmd
        - 07_rt_variability.qmd
        - 08_accuracy_variability.qmd
    - part: "Network context"
      chapters:
        - 09_longitudinal_coverage.qmd
  appendices:
    - part: "Task deepdives"
      chapters:
        - tasks/hearts_and_flowers.qmd
        - tasks/memory.qmd
        - tasks/same_different.qmd
        - tasks/math.qmd
        - tasks/math_item_calibration.qmd
        - tasks/math_eap_vs_ml.qmd
        - tasks/shape_rotation.qmd
        - tasks/sentence_understanding.qmd
        - tasks/vocab.qmd
        - tasks/stories_tom.qmd
        - tasks/tom_dimensionality.qmd
        - tasks/tom_dif_multigroup.qmd
        - tasks/tom_reality_check_bug.qmd
        - tasks/roar_word.qmd
        - tasks/roar_literacy.qmd
        - tasks/mrot/mrot_item_set_compare.qmd
        - tasks/sre.qmd
    - part: "Cross-task analyses"
      chapters:
        - tasks/corrected_trajectories.qmd
        - tasks/crosslang_dif_batch.qmd
        - tasks/test_retest_figures.qmd
        - tasks/training_vs_development.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-fold: true
    df-print: paged
    number-sections: false          # chapter titles already carry 00–09
    fig-width: 9
    fig-height: 5.5

execute:
  freeze: auto
  warning: false
  message: false

# Keep figure PNGs small enough for Quarto Pub's per-file upload limit:
# render at 96 dpi without the 2× retina multiplier (dense scatter/spaghetti
# plots otherwise exceed ~1 MB and 413 on publish). After changing this, wipe
# `_freeze/` so figures actually re-render at the new size.
knitr:
  opts_chunk:
    fig.retina: 1
    dpi: 96
